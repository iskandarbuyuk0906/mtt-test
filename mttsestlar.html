    <style>
        /* Zamonaviy dizayn tizimi */
        :root {
            --text-muted: #8a8a93;
            --accent-blue: #2563eb;
            --success-70: rgba(34, 197, 94, 0.7); /* 70% Yashil */
            --danger-70: rgba(239, 68, 68, 0.7);   /* 70% Qizil */
            --selected-blue: #e0f2fe;
            --selected-border: #3b82f6;
        }

        body, html { 
            margin: 0; 
            height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
        }

        .app-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            box-sizing: border-box;
        }

        #test-pane {
            background: #ffffff;
            width: 100%;
            max-width: 850px;
            min-height: 550px;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .progress-bar {
            font-weight: 600;
            color: var(--accent-blue);
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        #question {
            font-size: 1.45rem;
            color: #0f172a;
            margin-bottom: 2rem;
            line-height: 1.45;
        }

        #options-container {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            margin-bottom: 2.5rem;
        }

        /* Variant kartalari */
        .option-card {
            padding: 1.25rem 1.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            color: #334155;
            transition: all 0.2s ease;
            background: #f8fafc;
            line-height: 1.4;
            font-size: 1.05rem;
        }

        .option-card:hover:not(.locked) {
            border-color: #cbd5e1;
            background-color: #f1f5f9;
        }

        /* Tanlangan, ammo hali tasdiqlanmagan holat */
        .option-card.selected {
            background-color: var(--selected-blue) !important;
            border-color: var(--selected-border) !important;
            color: #0369a1 !important;
        }

        /* Tasdiqlangan ranglar (70% opacity) */
        .option-card.correct {
            background-color: var(--success-70) !important;
            border-color: #22c55e !important;
            color: white !important;
        }

        .option-card.wrong {
            background-color: var(--danger-70) !important;
            border-color: #ef4444 !important;
            color: white !important;
        }

        .option-card.locked {
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Navigatsiya tugmalari */
        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: auto;
            gap: 1rem;
        }

        .btn {
            padding: 0.9rem 2.2rem;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: white;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #475569;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #cbd5e1;
        }

        .btn:disabled {
            background: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
        }
    </style>
</head>

    let currentIdx = 0;
    
    // Test holatini boshqarish massivlari
    let userAnswers = Array(testData.length).fill(null); 
    let isApplied = Array(testData.length).fill(false);

    const progressText = document.getElementById('progress-text');
    const questionEl = document.getElementById('question');
    const optionsContainer = document.getElementById('options-container');
    const prevBtn = document.getElementById('prev-btn');
    const actionBtn = document.getElementById('action-btn');

    function loadQuestion() {
        const q = testData[currentIdx];
        
        progressText.innerText = `Savol: ${currentIdx + 1} / ${testData.length}`;
        questionEl.innerText = q.question;
        optionsContainer.innerHTML = '';

        // "Oldingi savol" tugmasini birinchi savolda o'chirish
        prevBtn.disabled = currentIdx === 0;

        // Markaziy harakat tugmasi holatini boshqarish
        if (isApplied[currentIdx]) {
            actionBtn.innerText = "Keyingi savol";
            actionBtn.disabled = false;
        } else {
            actionBtn.innerText = "Tasdiqlash";
            actionBtn.disabled = userAnswers[currentIdx] === null;
        }

        q.options.forEach(option => {
            const div = document.createElement('div');
            div.className = 'option-card';
            div.innerText = option;
            const letter = option.charAt(0);

            // Agar javob avval tasdiqlangan bo'lsa, ranglarini qayta tiklash (70% shaffoflik)
            if (isApplied[currentIdx]) {
                div.classList.add('locked');
                if (letter === q.correct) {
                    div.classList.add('correct');
                }
                if (userAnswers[currentIdx] === letter && letter !== q.correct) {
                    div.classList.add('wrong');
                }
            } 
            // Agar faqat belgilangan bo'lsa (lekin tasdiqlanmagan)
            else if (userAnswers[currentIdx] === letter) {
                div.classList.add('selected');
            }

            // Variantni tanlash (Faqatgina tasdiqlanmagan bo'lsagina ishlaydi)
            div.addEventListener('click', () => {
                if (isApplied[currentIdx]) return;

                document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                div.classList.add('selected');
                userAnswers[currentIdx] = letter;
                actionBtn.disabled = false; // "Tasdiqlash" tugmasini aktivlashtirish
            });

            optionsContainer.appendChild(div);
        });
    }

    // "Tasdiqlash" yoki "Keyingi savol" tugmasi bosilganda
    actionBtn.addEventListener('click', () => {
        if (!isApplied[currentIdx]) {
            // 1. Tasdiqlash harakati
            isApplied[currentIdx] = true;
            const q = testData[currentIdx];
            const selectedLetter = userAnswers[currentIdx];

            document.querySelectorAll('.option-card').forEach(card => {
                card.classList.add('locked');
                const letter = card.innerText.charAt(0);
                
                if (letter === q.correct) {
                    card.classList.add('correct');
                }
                if (letter === selectedLetter && selectedLetter !== q.correct) {
                    card.classList.add('wrong');
                }
            });

            actionBtn.innerText = "Keyingi savol";
        } else {
            // 2. Keyingi savolga o'tish
            currentIdx++;
            if (currentIdx < testData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }
    });

    // "Oldingi savol" tugmasi bosilganda
    prevBtn.addEventListener('click', () => {
        if (currentIdx > 0) {
            currentIdx--;
            loadQuestion();
        }
    });

    // Yakuniy natijani hisoblash va ko'rsatish
    function showResults() {
        let correctCount = 0;
        testData.forEach((q, index) => {
            if (userAnswers[index] === q.correct) {
                correctCount++;
            }
        });

        document.getElementById('test-pane').innerHTML = `
            <div style="text-align: center; margin: auto; padding: 1rem;">
                <h2 style="font-size: 2.5rem; color: #0f172a; margin-bottom: 0.5rem;">Test Yakunlandi! 🎉</h2>
                <p style="color: #64748b; font-size: 1.2rem; margin-bottom: 2rem;">Barcha savollar bo‘yicha umumiy natijangiz:</p>
                <div style="font-size: 1.8rem; font-weight: bold; color: var(--accent-blue); background: #eff6ff; padding: 1.5rem; border-radius: 12px; border: 2px dashed #bfdbfe;">
                    To‘g‘ri javoblar: ${correctCount} / ${testData.length}
                </div>
                <button onclick="location.reload()" class="btn btn-primary" style="margin-top: 2rem; align-self: center;">Qayta topshirish</button>
            </div>`;
    }

    // Platformani dastlabki yuklash
    loadQuestion();
</script>
</body>
</html>
